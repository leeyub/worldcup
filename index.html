}
/* ===== 라이트 테마 (토글로 전환, 기본은 다크) ===== */
:root[data-theme="light"]{
  --bg:#f3f4f6; --card:#ffffff; --card2:#f6f7f9; --line:#e6e8ec;

}
:root[data-theme="light"] .card{border-color:#ece6db;box-shadow:0 1px 2px rgba(60,50,30,.04),0 8px 20px rgba(60,50,30,.06)}
:root[data-theme="light"] .lbrow{box-shadow:0 1px 2px rgba(60,50,30,.04),0 4px 12px rgba(60,50,30,.05)}
:root[data-theme="light"] .tab{box-shadow:0 1px 2px rgba(60,50,30,.04)}
:root[data-theme="light"] .tab.on{background:linear-gradient(135deg,#e9effc,#dce6fb);color:#1d4ed8}
:root[data-theme="light"] #modal{background:rgba(35,35,45,.42)}

.themebtn{font-size:16px;line-height:1;padding:6px 8px;border-radius:8px;color:var(--sub)}

input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield;appearance:textfield}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;padding-bottom:84px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}
header{padding:6px 16px 10px;text-align:center}
.topbar{display:flex;justify-content:flex-end;align-items:center;gap:4px;max-width:560px;margin:0 auto;padding:12px 14px 0}
.toplink{font-size:13px;font-weight:700;color:var(--sub);padding:6px 10px;border-radius:8px}
.toplink:active{background:var(--pill)}
.toplink.hot{color:var(--txt)}
.topuser{font-size:13px;font-weight:700;color:var(--gold);padding:6px 4px}
.topsep{color:var(--line)}
header h1{font-size:20px;font-weight:800}
header .sub{color:var(--sub);font-size:12px;margin-top:4px}
.wrap{max-width:560px;margin:0 auto;padding:0 12px}
.tabs{display:flex;gap:6px;margin:14px 0 8px;overflow-x:auto}
.tab{flex:1;min-width:80px;padding:13px 9px;border-radius:14px;background:var(--card);border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--sub);text-align:center;white-space:nowrap}
.tab.on{background:linear-gradient(135deg,#21305c,#1a2440);color:var(--txt);border-color:var(--blue)}
.tab .d{display:block;font-size:10px;font-weight:500;margin-top:2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;margin-bottom:14px}
.card h3{font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px;margin-bottom:10px}
.pt{margin-left:auto;font-size:11px;font-weight:800;color:var(--gold);background:var(--sel);padding:3px 8px;border-radius:99px}
.hint{font-size:11px;color:var(--sub);margin:-6px 0 10px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{display:flex;align-items:center;gap:6px;background:var(--pill);border:1px solid var(--line);border-radius:99px;padding:9px 14px;font-size:13px;font-weight:600}
.chip.done{border-color:var(--green)}
.addrow{display:flex;gap:8px;margin-top:10px}
.addrow input{flex:1;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--txt);font-size:14px}
.btn{border-radius:12px;padding:11px 16px;font-size:14px;font-weight:700;transition:.15s}
.btn.p{background:linear-gradient(135deg,var(--red),#c2273a);color:#fff}
.btn.b{background:linear-gradient(135deg,var(--blue),#2563eb);color:#fff}
.btn.g{background:var(--pill);border:1px solid var(--line);color:var(--txt)}
.btn.w{width:100%;margin-top:8px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn:active{transform:scale(.97)}
.mhead{display:flex;align-items:center;justify-content:center;gap:14px;padding:14px 0 4px}
.mhead .t{text-align:center;font-size:13px;font-weight:800}
.mhead .t .f{font-size:34px;display:block}
.mhead .vs{font-size:12px;color:var(--sub);font-weight:700}
.mhead .sc{font-size:30px;font-weight:900;letter-spacing:2px}
.minfo{text-align:center;color:var(--sub);font-size:11px;margin-bottom:10px}
.opts{display:grid;gap:8px}
.opts.c2{grid-template-columns:1fr 1fr}.opts.c3{grid-template-columns:1fr 1fr 1fr}
.opt{background:var(--card2);border:1.5px solid var(--line);border-radius:12px;padding:14px 10px;font-size:13px;font-weight:600;text-align:center;transition:.12s}
.opt.on,.opt.on.bl{border-color:var(--selbd);background:var(--sel)} /* 선택 상태 */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pcard{background:var(--card2);border:1.5px solid var(--line);border-radius:12px;padding:13px;text-align:left;transition:.12s}
.pcard.on{border-color:var(--selbd);background:var(--sel)}
.pcard .nm{font-size:13px;font-weight:800;display:flex;justify-content:space-between}
.pcard .nm em{font-style:normal;font-size:10px;color:var(--sub);font-weight:600}
.pcard .st{font-size:10px;color:var(--sub);margin-top:3px}
.pcard .pr{color:var(--gold);font-weight:700}
.pcard.none{grid-column:1/-1;text-align:center}
.scorein{display:flex;align-items:center;justify-content:center;gap:12px}
.scorein .side{text-align:center}
.scorein .side .f{font-size:24px}
.stepper{display:flex;align-items:center;gap:10px;margin-top:6px}
.stepper button{width:36px;height:36px;border-radius:10px;background:var(--pill);border:1px solid var(--line);font-size:18px;font-weight:800}
.stepper .v{font-size:26px;font-weight:900;min-width:30px;text-align:center}
select.sel,input.txtin{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:11px 12px;color:var(--txt);font-size:14px}
select.sel{min-height:50px;padding:14px 12px;font-weight:600}
.brow{padding:16px 0;border-bottom:1px solid var(--line)}
.brow:last-child{border:none}
.brow .bl{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:6px}
.bchips{display:flex;flex-wrap:wrap;gap:6px}
.bchip{background:var(--pill);border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:12px}
.bchip b{color:var(--gold);font-weight:700}
.bchip.uniq{border-color:var(--red)}
.bchip.hit{border-color:var(--green);background:rgba(52,211,153,.12)}
.bchip.miss{opacity:.45;text-decoration:line-through}
.lbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lbtns .full{grid-column:1/-1}
.lb{position:relative}
.lbrow{display:flex;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:8px;transition:transform .5s cubic-bezier(.2,.8,.2,1)}
.lbrow .rk{font-size:16px;font-weight:900;width:28px;text-align:center}
.lbrow .nm{font-weight:700;font-size:14px;flex:1}
.lbrow .pts{font-size:18px;font-weight:900;color:var(--gold)}
.lbrow .pend{font-size:10px;color:var(--sub)}
.lbrow.first{border-color:var(--selbd);background:linear-gradient(135deg,var(--sel),var(--card2))}
.lbrow .det{font-size:10px;color:var(--sub);width:100%}
.lbrow.gain{animation:gain 1.2s}
@keyframes gain{0%,100%{box-shadow:none}30%{box-shadow:0 0 0 2px var(--green)}}
.breakdown{display:none;grid-column:1/-1;width:100%;font-size:11px;color:var(--sub);padding-top:6px}
.lbrow.open .breakdown{display:block}
.bd-it{display:flex;justify-content:space-between;padding:2px 0}
.bd-it.hit{color:var(--green)} .bd-it.miss{color:#f87171} .bd-it.pend{color:var(--sub)}
.evlog{font-size:12px;color:var(--sub);line-height:1.9}
#toasts{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:99;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toast{background:linear-gradient(135deg,#14532d,#166534);color:#d1fae5;border:1px solid var(--green);padding:8px 16px;border-radius:99px;font-size:13px;font-weight:800;animation:tin .3s, tout .4s 2.6s forwards}
@keyframes tin{from{opacity:0;transform:translateY(-10px)}}
@keyframes tout{to{opacity:0;transform:translateY(-10px)}}
#modal{position:fixed;inset:0;background:rgba(5,8,15,.85);z-index:50;display:none;overflow-y:auto;padding:16px 12px 80px}
#modal.show{display:block}
.mbox{max-width:560px;margin:0 auto}
.mbar{position:sticky;top:0;background:var(--bg);display:flex;align-items:center;gap:8px;padding:8px 0;z-index:5}
.mbar h2{font-size:16px;font-weight:800;flex:1}
.foot{text-align:center;color:var(--sub);font-size:11px;margin-top:28px;line-height:1.8;padding-bottom:32px}
.crown{font-size:16px}
.tag{font-size:10px;background:var(--pill);border-radius:6px;padding:2px 6px;color:var(--sub)}
.taggrp{display:flex;flex-direction:column;gap:3px;align-items:flex-start}
.warnbox{background:rgba(230,57,75,.1);border:1px solid rgba(230,57,75,.4);border-radius:12px;padding:10px 12px;font-size:12px;color:#fca5a5;margin-bottom:12px}
#errbar{display:none;background:#7f1d1d;color:#fecaca;font-size:12px;font-weight:700;text-align:center;padding:8px}
#loading{text-align:center;padding:60px 0;color:var(--sub);font-size:14px}
.sync{font-size:10px;color:var(--sub);text-align:center;margin-top:4px}
/* ---- DEMO MODE ---- */
.demobar{position:fixed;left:0;right:0;bottom:0;z-index:300;background:var(--card);border-top:1px solid var(--gold);padding:8px 10px 10px;display:flex;flex-direction:column;gap:6px}
.demobar .dl{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.demobar .dt{color:var(--gold);font-weight:800;font-size:10px;min-width:32px}
.demobar button{background:var(--pill);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:5px 9px;font-size:11px;font-weight:700;cursor:pointer}
.demobar button.on{border-color:var(--gold);color:var(--gold)}

function demoClient(){
  function table(name){
    return {
      select(){const q={order(){return Promise.resolve({data:demoDB[name],error:null})},eq(k,v){q._f=[k,v];return q},single(){return Promise.resolve({data:demoDB[name].find(x=>x[q._f[0]]===q._f[1]),error:null})},then(res){res({data:demoDB[name],error:null})}};return q;},
      insert(row){demoDB[name].push({id:'d'+Date.now(),created_at:Date.now(),...row});return Promise.resolve({error:null});},
      update(patch){return{eq(k,v){const r=demoDB[name].find(x=>x[k]===v);if(r)Object.assign(r,patch);return Promise.resolve({error:null});}};},
      upsert(row){
        if(name==='predictions'){const ex=demoDB[name].find(x=>x.match_id===row.match_id&&x.participant_id===row.participant_id);if(ex)Object.assign(ex,row);else demoDB[name].push(row);}
        else {const ex=demoDB[name].find(x=>x.key===row.key);if(ex)Object.assign(ex,row);else demoDB[name].push(row);}
        return Promise.resolve({error:null});},
      delete(){return{eq(k,v){demoDB[name]=demoDB[name].filter(x=>x[k]!==v);return Promise.resolve({error:null});},neq(){demoDB[name]=[];return Promise.resolve({error:null});}};}
    };
  }
  return {from:table};
}

/* ================= SCORING ================= */
function getFacts(M){
  const L=M.live, g=L.goals, f={};
  const fg=g[0];
  if(fg){f.firstTeam=fg.team; f.firstBand=bandOf(fg.min);}
  else if(L.finished){f.firstTeam='none'; f.firstBand=-1;}
  const krg=g.filter(x=>x.team==='kr'), opg=g.filter(x=>x.team==='opp');
  if(krg[0]) f.krFirst=krg[0].scorer; else if(L.finished) f.krFirst='없음';
  if(opg[0]) f.oppFirst=opg[0].scorer; else if(L.finished) f.oppFirst='없음';
  if(L.half) f.half=Math.sign(L.half.kr-L.half.opp);
  if(L.finished){
    f.kr=krg.length; f.opp=opg.length;
    f.outcome=Math.sign(f.kr-f.opp);
    f.cards=L.cards<=2?0:L.cards<=5?1:2;
    f.mvp=L.mvp;
  }
  return f;
}
function bandOf(min){return min<=15?0:min<=30?1:min<=45?2:min<=60?3:min<=75?4:5;}
function scorePred(p,f){
  const items=[];
  const add=(label,max,known,pts)=>items.push({label,max,pts:known?pts:0,state:known?(pts>0?'hit':'miss'):'pend'});
  add('경기 결과',60,'outcome'in f, p.result===f.outcome?60:0);
  let sc=0;
  if('outcome'in f){
    if(p.kr===f.kr&&p.opp===f.opp)sc=70;
    else if(Math.sign(p.kr-p.opp)===f.outcome)sc=30;
    else if(p.kr===f.kr||p.opp===f.opp)sc=15;
  }
  add('최종 스코어',70,'outcome'in f,sc);
  add('🇰🇷 첫 득점자',40,'krFirst'in f, p.krFirst===f.krFirst?40:0);
  add('상대 첫 득점자',40,'oppFirst'in f, p.oppFirst===f.oppFirst?40:0);
  add('첫 골 팀',15,'firstTeam'in f, p.firstTeam===f.firstTeam?15:0);
  let bd=0;
  if('firstBand'in f){
    if(p.band===f.firstBand)bd=30;
    else if(p.band>=0&&f.firstBand>=0&&Math.abs(p.band-f.firstBand)===1)bd=15;
  }
  add('첫 골 시간대',30,'firstBand'in f,bd);
  add('전반전 결과',15,'half'in f, p.half===f.half?15:0);
  add('카드 수',15,'cards'in f, p.cards===f.cards?15:0);
  add('MVP',15,'mvp'in f, p.mvp===f.mvp?15:0);
  return items;
}
function totalOf(items){return items.reduce((s,i)=>s+i.pts,0)}
function pendingOf(items){return items.filter(i=>i.state==='pend').reduce((s,i)=>s+i.max,0)}
function matchScores(M){
  const f=getFacts(M), out={};
  for(const pid in M.preds){const it=scorePred(M.preds[pid],f);out[pid]={items:it,total:totalOf(it),pending:pendingOf(it)};}
  return out;
}

function boardCard(mid,m,O,M){
  const f=getFacts(M);
  const pids=Object.keys(M.preds);
  if(!pids.length)return'';
  const row=(label,get,fact)=>{
    const vals=pids.map(pid=>get(M.preds[pid]));
    const counts={};vals.forEach(v=>counts[v]=(counts[v]||0)+1);
    return `<div class="brow"><div class="bl">${label}</div><div class="bchips">${pids.map((pid,i)=>{
      const v=vals[i];let cls='';
      if(fact!==undefined)cls=v===fact?'hit':'miss';
      else if(counts[v]===1&&pids.length>=3)cls='uniq';
      return `<span class="bchip ${cls}">${avatarOf(pid)} <b>${esc(String(v))}</b></span>`;
    }).join('')}</div></div>`;
  };
  const oname=O.name;
  const resTxt=v=>v===1?'🇰🇷 승':v===0?'무':oname+' 승';
  const ftTxt=v=>v==='kr'?'🇰🇷':v==='opp'?O.flag+oname:'무득점';
  let html=`<div class="card"><h3>👀 예측 비교 보드</h3>
  <div class="hint">${'outcome'in f?'초록 = 적중, 흐림 = 탈락':'빨간 테두리 = 나 혼자만 고른 예측 🦄'}</div>`;
  html+=row('경기 결과',p=>resTxt(p.result),'outcome'in f?resTxt(f.outcome):undefined);
  html+=row('최종 스코어',p=>p.kr+':'+p.opp,'outcome'in f?f.kr+':'+f.opp:undefined);
  html+=row('🇰🇷 첫 득점자',p=>p.krFirst,f.krFirst);
  html+=row(`${O.flag} 첫 득점자`,p=>p.oppFirst,f.oppFirst);
  html+=row('첫 골 팀',p=>ftTxt(p.firstTeam),f.firstTeam!==undefined?ftTxt(f.firstTeam):undefined);
  html+=row('첫 골 시간대',p=>p.band===-1?'무득점':BANDS[p.band],'firstBand'in f?(f.firstBand===-1?'무득점':BANDS[f.firstBand]):undefined);
  html+=row('전반전 결과',p=>resTxt(p.half),'half'in f?resTxt(f.half):undefined);
  html+=row('카드 수',p=>CARDS[p.cards],'cards'in f?CARDS[f.cards]:undefined);
  html+=row('MVP',p=>p.mvp,f.mvp);
  const cm=pids.filter(pid=>M.preds[pid].comment);
  if(cm.length)html+=`<div class="brow"><div class="bl">한 줄 코멘트</div>${cm.map(pid=>`<div style="font-size:12px;padding:2px 0">${avatarOf(pid)} <b>${esc(pname(pid))}</b> : ${esc(M.preds[pid].comment)}</div>`).join('')}</div>`;
  return html+'</div>';
}
function renderTotal(){
  const totals={};
  S.participants.forEach(p=>totals[p.id]={t:0,per:[]});
  MATCHES.forEach(m=>{
    const sc=matchScores(S.matches[m.id]);
    S.participants.forEach(p=>{
      const v=sc[p.id]?sc[p.id].total:null;
      totals[p.id].per.push(v);
      totals[p.id].t+=v||0;
    });
  });
  const rows=S.participants.map(p=>({p,...totals[p.id]})).sort((a,b)=>b.t-a.t);
  let html=`<div class="card"><h3>🏆 종합 순위 <span class="pt">3경기 합산 · 최대 900점</span></h3>`;
  if(!rows.length)html+='<div class="hint">참여자가 없습니다</div>';
  html+=rows.map((r,i)=>{
    const last=rows.length>=3&&i===rows.length-1&&r.t>0;
    return `<div class="lbrow ${i===0&&r.t>0?'first':''}">
      <span class="rk">${i===0&&r.t>0?'👑':i+1}</span>
      <span class="nm">${avatarOf(r.p.id)} ${esc(r.p.name)} ${last?'<span class="tag">🍗 치킨 당번 후보</span>':''}</span>
      <span class="det" style="width:auto;flex:none">${r.per.map((v,j)=>`${j+1}차 ${v===null?'-':v}`).join(' · ')}</span>
      <span class="pts">${r.t}점</span>
    </div>`;
  }).join('');
  html+=`</div>${rulesCard()}`;
  $('#app').innerHTML=html;
}

async function lockMatch(mid){

}
async function startLive(mid){
  if(!ADMIN)return adminGate(()=>startLive(mid));
  S.matches[mid].live.on=true;
  await writeLive(mid);render();
}
async function withDiff(mid,fn){
  BUSY=true;
  const M=S.matches[mid];
  const before=matchScores(M);
  fn();
  await writeLive(mid);
  BUSY=false;
  const after=matchScores(M);
  const prevOrder=lbOrder();
  for(const pid in after){
    const d=after[pid].total-(before[pid]?before[pid].total:0);
    if(d>0)toast(`${avatarOf(pid)} ${pname(pid)} +${d}점!`);
    else if(d<0)toast(`${avatarOf(pid)} ${pname(pid)} ${d}점`,true);
  }
  render();
  flip(prevOrder);
}
function lbOrder(){
  const o={};document.querySelectorAll('#lb .lbrow').forEach(el=>o[el.dataset.pid]=el.getBoundingClientRect().top);
  return o;
}
function flip(prev){
  document.querySelectorAll('#lb .lbrow').forEach(el=>{
    const pid=el.dataset.pid;
    if(prev[pid]===undefined)return;
    const d=prev[pid]-el.getBoundingClientRect().top;
    if(Math.abs(d)>2){
      el.style.transition='none';el.style.transform=`translateY(${d}px)`;
      requestAnimationFrame(()=>{el.style.transition='';el.style.transform='';el.classList.add('gain');setTimeout(()=>el.classList.remove('gain'),1300);});
    }
  });
}
function toast(msg,bad){
  const t=document.createElement('div');t.className='toast';if(bad)t.style.filter='hue-rotate(220deg)';
  t.textContent=msg;$('#toasts').appendChild(t);setTimeout(()=>t.remove(),3100);
}

async function undoEv(mid){
  if(!ADMIN)return adminGate(()=>undoEv(mid));

    ${L.half?'':'<div class="warnbox">⚠️ 전반 종료가 기록되지 않았습니다. 뒤로 가서 ⏸ 전반 종료를 먼저 누르면 전반 항목도 채점됩니다.</div>'}
    <div class="hint">최종 스코어 ${kr}:${op} · 카드 ${L.cards}장</div>
    <div style="font-size:12px;color:var(--sub);margin:8px 0 4px">이 경기 MVP는?</div>
    <select class="sel" id="f_mvp">${all.map(n=>`<option value="${n.split(' ').slice(1).join(' ')}">${n}</option>`).join('')}</select>
    <button class="btn p w" onclick="confirmFinish('${mid}')">최종 채점하기 🎉</button>
    <button class="btn g w" onclick="closeModal()">취소</button></div>`);
}
function confirmFinish(mid){
  const mvp=$('#f_mvp').value;closeModal();
  withDiff(mid,()=>{const L=S.matches[mid].live;L.finished=true;L.mvp=mvp;});
  window.scrollTo(0,0);
}

/* ================= 예측 폼 ================= */
let F=null;
function openForm(mid,pid){
  const M=S.matches[mid];
  if(M.locked){alert('이미 마감된 경기입니다');return;}
  const ex=M.preds[pid];
  F={mid,pid,d:ex?JSON.parse(JSON.stringify(ex)):{result:null,kr:0,opp:0,krFirst:null,oppFirst:null,firstTeam:null,band:null,half:null,cards:null,mvp:null,comment:''}};
  drawForm();
}
function drawForm(){
  const m=MATCHES.find(x=>x.id===F.mid),O=TEAMS[m.opp],d=F.d;
  const sec=(title,pts,hint,body)=>`<div class="card"><h3>${title}<span class="pt">${pts}점</span></h3>${hint?`<div class="hint">${hint}</div>`:''}${body}</div>`;
  const opt3=(key,labels,vals,blue)=>`<div class="opts c3">${labels.map((l,i)=>`<button class="opt ${d[key]===vals[i]?'on':''} ${blue?'bl':''}" onclick="setF('${key}',${typeof vals[i]==='string'?`'${vals[i]}'`:vals[i]})">${l}</button>`).join('')}</div>`;
  const pgrid=(key,team)=>`<div class="pgrid">${team.players.map(p=>`<button class="pcard ${d[key]===p.n?'on':''}" onclick="setF('${key}','${p.n.replace(/'/g,"\\'")}')">
      <div class="nm">${p.n}<em>${p.pos}</em></div><div class="st">${p.club} · ${p.g}골 · <span class="pr">득점확률 ${p.p}%</span></div></button>`).join('')}
    <button class="pcard none ${d[key]==='없음'?'on':''}" onclick="setF('${key}','없음')"><div class="nm" style="justify-content:center">없음 (${team.name} 무득점)</div></button></div>`;
  const mvpOpts=[...TEAMS.kr.players.map(p=>({v:p.n,t:'🇰🇷 '+p.n+' ('+p.pos+')'})),...O.players.map(p=>({v:p.n,t:O.flag+' '+p.n+' ('+p.pos+')'}))];

  showModal(`<div class="mbar"><button class="btn g" onclick="closeModal()">✕</button><h2>${avatarOf(F.pid)} ${esc(pname(F.pid))}의 예측 — ${m.label} vs ${O.name}</h2></div>
  ${sec('경기 결과',20,'',opt3('result',['🇰🇷 한국 승','🤝 무승부',O.flag+' '+O.name+' 승'],[1,0,-1]))}
  ${sec('최종 스코어',25,'정확히 25점 · 승패만 10점 · 한 팀만 5점',`
    <div class="scorein">
      <div class="side"><span class="f">🇰🇷</span><div class="stepper"><button onclick="stepF('kr',-1)">−</button><span class="v">${d.kr}</span><button onclick="stepF('kr',1)">＋</button></div></div>
      <div style="font-size:22px;font-weight:900">:</div>
      <div class="side"><span class="f">${O.flag}</span><div class="stepper"><button onclick="stepF('opp',-1)">−</button><span class="v">${d.opp}</span><button onclick="stepF('opp',1)">＋</button></div></div>
    </div>`)}
  ${sec('🇰🇷 대한민국 첫 득점자',15,'포지션 · A매치 통산 골 · 이번 경기 득점 확률',pgrid('krFirst',TEAMS.kr))}
  ${sec(O.flag+' '+O.name+' 첫 득점자',15,'',pgrid('oppFirst',O))}
  ${sec('첫 골 팀',5,'',opt3('firstTeam',['🇰🇷 한국',O.flag+' '+O.name,'없음 (무득점)'],['kr','opp','none'],1))}
  ${sec('첫 골 시간대',10,'인접 시간대 선택 시 5점',`<div class="opts c2">${BANDS.map((b,i)=>`<button class="opt ${d.band===i?'on':''} bl" onclick="setF('band',${i})">${b}</button>`).join('')}<button class="opt ${d.band===-1?'on':''} bl" style="grid-column:1/-1" onclick="setF('band',-1)">없음 (무득점)</button></div>`)}
  ${sec('전반전 결과',5,'',opt3('half',['🇰🇷 리드','🤝 무승부',O.flag+' 리드'],[1,0,-1]))}
  ${sec('양 팀 합산 카드 수',5,'',opt3('cards',CARDS,[0,1,2],1))}
  ${sec('MVP 예측',5,'',`<select class="sel" onchange="setF('mvp',this.value||null)"><option value="">* 선택하세요</option>${mvpOpts.map(o=>`<option value="${o.v}" ${d.mvp===o.v?'selected':''}>${o.t}</option>`).join('')}</select>`)}
  ${sec('한 줄 코멘트 (선택)',0,'도발 환영 😎',`<input class="txtin" value="${esc(d.comment||'')}" maxlength="40" onchange="F.d.comment=this.value" placeholder="예: 오늘 손흥민 해트트릭 갑니다">`)}
  <button class="btn p w" style="padding:15px" onclick="submitForm()">예측 제출하기 ✅</button>
  <div style="height:30px"></div>`);
}
function setF(k,v){F.d[k]=v;const y=$('#modal').scrollTop;drawForm();$('#modal').scrollTop=y;}
function stepF(k,dir){F.d[k]=Math.max(0,Math.min(9,F.d[k]+dir));setF(k,F.d[k]);}
async function submitForm(){
  const d=F.d,miss=[];
  if(d.result===null)miss.push('경기 결과');
  if(!d.krFirst)miss.push('한국 첫 득점자');
  if(!d.oppFirst)miss.push('상대 첫 득점자');
  if(!d.firstTeam)miss.push('첫 골 팀');
  if(d.band===null)miss.push('첫 골 시간대');
  if(d.half===null)miss.push('전반전 결과');
  if(d.cards===null)miss.push('카드 수');
  if(!d.mvp)miss.push('MVP');
  if(miss.length){alert('아직 입력 안 한 항목: '+miss.join(', '));return;}
  if(Math.sign(d.kr-d.opp)!==d.result&&!confirm('⚠️ 최종 스코어와 경기 결과 예측이 서로 다릅니다. 그래도 제출할까요?'))return;
  BUSY=true;
  // 마감 여부 최종 확인
  const {data:msRow}=await sb.from('match_state').select('locked').eq('match_id',F.mid).single();
  if(msRow&&msRow.locked){BUSY=false;alert('방금 마감되어 제출할 수 없습니다 😢');closeModal();await fetchAll();render();return;}
  const {error}=await sb.from('predictions').upsert(
    {match_id:F.mid,participant_id:F.pid,data:d,updated_at:new Date().toISOString()},
    {onConflict:'match_id,participant_id'});
  BUSY=false;
  if(error){alert('제출 실패: '+error.message);return;}
  toast(`${avatarOf(F.pid)} ${pname(F.pid)} 예측 제출 완료!`);
  closeModal();await fetchAll();render();
}

/* ---------- 공유 ---------- */
function copyResult(mid){
  const m=MATCHES.find(x=>x.id===mid),O=TEAMS[m.opp],M=S.matches[mid];
  const sc=matchScores(M);
  const rows=Object.keys(sc).map(pid=>({pid,t:sc[pid].total})).sort((a,b)=>b.t-a.t);
  const L=M.live;
  const kr=L.goals.filter(g=>g.team==='kr').length,op=L.goals.filter(g=>g.team==='opp').length;
  let txt=`⚽ ${m.label} 🇰🇷 ${kr}:${op} ${O.flag}\n— SKT 35기 월드컵응원단 예측 결과 —\n`;
  rows.forEach((r,i)=>txt+=`${i===0?'👑':i+1+'위'} ${pname(r.pid)} ${r.t}점\n`);
  navigator.clipboard.writeText(txt).then(()=>toast('복사 완료! 카톡에 붙여넣으세요 📋'));
}

/* ---------- 모달 ---------- */
function showModal(html){MODAL_OPEN=true;$('#modal').innerHTML=`<div class="mbox">${html}</div>`;$('#modal').classList.add('show');$('#modal').scrollTop=0;document.body.style.overflow='hidden';}
function closeModal(){MODAL_OPEN=false;$('#modal').classList.remove('show');document.body.style.overflow='';}

/* ---------- 테마 토글 (라이트/다크, 선택은 localStorage 저장) ---------- */
function toggleTheme(){
  const next=document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',next);
  try{localStorage.setItem('theme',next);}catch(e){}
  syncThemeBtn();
}
function syncThemeBtn(){
  const light=document.documentElement.getAttribute('data-theme')==='light';
  const b=document.getElementById('themeBtn'); if(b) b.textContent=light?'☀️':'🌙';
}
syncThemeBtn();

/* ================= INIT ================= */
(async()=>{
  if(DEMO_MODE){
    USER='u1';ADMIN=true;
    await demoState('locked'); // 기본: 마감 상태(비교보드 노출)
    demoBar();
    return;
  }
  if(SUPABASE_URL.includes('붙여넣기')){err('아직 설정 전입니다 — index.html 상단의 SUPABASE_URL과 SUPABASE_ANON_KEY를 입력하세요 (설치가이드 참고)');return;}
  try{await fetchAll();render();}
  catch(e){console.error(e);}
})();
</script>
