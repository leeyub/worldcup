<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>SKT 35기 월드컵응원단</title>
<script>/* dev 미리보기 호스트면 타이틀 앞에 dev- 표시(썸네일 구별용) */try{if(/^dev-|-git-dev-/.test(location.hostname))document.title='dev- '+document.title;}catch(e){}</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- 폰트 A/B 비교용(둘 다 로드): 결정 후 한쪽만 남길 예정 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT/fonts/static/woff2/SUIT.css">
<style>
:root{
  --bg:#0b0f1a; --card:#151b2b; --card2:#1d2538; --line:#2a3450;
  --txt:#e8ecf5; --sub:#8c97b3; --red:#e6394b; --blue:#3b82f6;
  --gold:#fbbf24; --green:#34d399; --pill:#232c44; --sel:rgba(251,191,36,.12); --selbd:#fbbf24; /* --sel:선택 틴트, --selbd:선택 테두리 — 한 곳에서 제어 */
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px; --sp-8:32px; /* 4/8 스페이싱 스케일 — DESIGN.md */
  color-scheme:dark; /* 브라우저 기본 컨트롤(화살표·스피너·자동완성 아이콘)을 다크로 */
}
/* ===== 라이트 테마 (토글로 전환, 기본은 다크) ===== */
:root[data-theme="light"]{
  --bg:#f3f4f6; --card:#ffffff; --card2:#f6f7f9; --line:#e6e8ec;
  --txt:#1a1d24; --sub:#868d9a; --red:#e23b4d; --blue:#2f6bdf;
  --gold:#d4880c; --green:#159b6e; --pill:#eef0f3; --sel:rgba(47,107,223,.10); --selbd:#2f6bdf;
  color-scheme:light;
}
:root[data-theme="light"] .card{box-shadow:0 1px 2px rgba(17,24,39,.05),0 8px 20px rgba(17,24,39,.07)}
:root[data-theme="light"] .lbrow{box-shadow:0 1px 2px rgba(17,24,39,.05),0 4px 12px rgba(17,24,39,.06)}
:root[data-theme="light"] .tab{box-shadow:0 1px 2px rgba(17,24,39,.05)}
:root[data-theme="light"] .tab.on{background:linear-gradient(135deg,#e9effc,#dce6fb);color:#1d4ed8}
:root[data-theme="light"] #modal{background:rgba(35,35,45,.42)}
:root[data-theme="light"] #modal.sheet{background:var(--bg)}
:root[data-theme="light"] .warnbox{color:#b3261e}
/* Apple식 코너 스무딩(슈퍼타원) — 지원 브라우저(Chrome 139+)만 적용, Safari·구형은 일반 라운드로 자동 폴백 */
@supports (corner-shape: superellipse(4)){
  .card,.tab,.opt,.pcard,.chip,.btn,.bchip,.lbrow,.pt,.tag,.stepper button,select.sel,input.txtin,.addrow input,.warnbox,.toast,.demobar button,.themebtn{corner-shape:superellipse(4)}
}
.themebtn{width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;padding:0;border:1px solid var(--line);background:var(--card2);border-radius:10px;color:var(--txt)}
.themebtn svg{width:18px;height:18px;display:block}
.themebtn:active{background:var(--pill)}
/* 숫자 입력 스피너 제거 (골 시간 입력 등) */
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield;appearance:textfield}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:'SUIT','Pretendard',-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;padding-bottom:84px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}
header{padding:30px 16px 12px;text-align:center}
.topbar{display:flex;justify-content:flex-end;align-items:center;gap:4px;max-width:560px;margin:0 auto;padding:calc(12px + env(safe-area-inset-top)) 14px 0}
.toplink{font-size:13px;font-weight:700;color:var(--sub);padding:6px 10px;border-radius:8px}
.toplink:active{background:var(--pill)}
.toplink.hot{color:var(--txt)}
.topuser{font-size:13px;font-weight:700;color:var(--gold);padding:6px 4px}
.topsep{color:var(--line)}
header h1{font-size:20px;font-weight:800}
header .sub{color:var(--sub);font-size:12px;margin-top:4px}
.wrap{max-width:560px;margin:0 auto;padding:0 var(--sp-3)}
.tabs{display:flex;gap:6px;margin:14px 0 8px;overflow-x:auto;overflow-y:hidden;touch-action:pan-x}
.tab{flex:1;min-width:80px;padding:var(--sp-3) var(--sp-2);border-radius:14px;background:var(--card);border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--sub);text-align:center;white-space:nowrap}
.tab.on{background:linear-gradient(135deg,#21305c,#1a2440);color:var(--txt);border-color:var(--blue)}
.tab.soon{opacity:.5}
.subtabs{display:flex;gap:4px;margin-bottom:14px;border-bottom:1px solid var(--line)}
.subtab{flex:1;padding:10px 8px;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;border-radius:0;font-size:13px;font-weight:700;color:var(--sub)}
.subtab.on{color:var(--txt);border-bottom-color:var(--selbd)}
.tab .d{display:block;font-size:10px;font-weight:500;margin-top:2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:var(--sp-5);margin-bottom:var(--sp-4)}
.card h3{font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px;margin-bottom:12px}
.pt{margin-left:auto;font-size:11px;font-weight:800;color:var(--gold);background:var(--pill);padding:3px 8px;border-radius:8px}
.hint{font-size:12px;color:var(--sub);margin:-8px 0 12px;line-height:1.5}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--pill);border:1px solid var(--line);border-radius:10px;padding:var(--sp-2) var(--sp-4);font-size:13px;font-weight:600}
.chip.done{border-color:var(--green)}
.chip .ck{font-size:10px;color:var(--green);font-weight:800;margin-left:3px}
.pgroup+.pgroup{margin-top:14px}
.glabel{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.glabel .gn{color:var(--txt)}
.addrow{display:flex;gap:8px;margin-top:10px}
.addrow input{flex:1;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--txt);font-size:14px}
.btn{border-radius:12px;padding:11px 16px;font-size:14px;font-weight:700;transition:.15s}
.btn.p{background:linear-gradient(135deg,var(--red),#c2273a);color:#fff}
.btn.b{background:linear-gradient(135deg,var(--blue),#2563eb);color:#fff}
.btn.g{background:var(--pill);border:1px solid var(--line);color:var(--txt)}
.btn.w{width:100%;margin-top:8px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn:active{transform:scale(.97)}
.mhead{display:flex;align-items:center;justify-content:center;gap:14px;padding:14px 0 4px}
.mhead .t{text-align:center;font-size:13px;font-weight:800}
.mhead .t .f{font-size:34px;display:block}
.mhead .vs{font-size:12px;color:var(--sub);font-weight:700}
.mhead .sc{font-size:30px;font-weight:900;letter-spacing:2px}
.minfo{text-align:center;color:var(--sub);font-size:12px;margin-bottom:18px}
.livechip{display:inline-flex;align-items:center;gap:4px;background:var(--red);color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;vertical-align:middle}
.livechip.sm{font-size:8px;padding:1px 6px;gap:3px}
.livechip .dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:pulse 1.2s infinite}
.livechip.sm .dot{width:4px;height:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.endchip{display:inline-flex;align-items:center;background:rgba(52,211,153,.16);color:var(--green);font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;vertical-align:middle}
.opts{display:grid;gap:8px}
.opts.c2{grid-template-columns:1fr 1fr}.opts.c3{grid-template-columns:1fr 1fr 1fr}
.opt{background:var(--card2);border:1.5px solid var(--line);border-radius:12px;padding:10px var(--sp-3);min-height:50px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:13px;font-weight:600;transition:.12s}
.opt.on,.opt.on.bl{border-color:var(--selbd);background:var(--sel)} /* 선택 상태 */
.halflbl{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:7px}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pcard{background:var(--card2);border:1.5px solid var(--line);border-radius:12px;padding:var(--sp-3);text-align:left;transition:.12s}
.pcard.on{border-color:var(--selbd);background:var(--sel)}
.pcard .nm{font-size:13px;font-weight:800;display:flex;justify-content:space-between}
.pcard .nm em{font-style:normal;font-size:10px;color:var(--sub);font-weight:600}
.pcard .st{font-size:10px;color:var(--sub);margin-top:3px}
.pcard .pr{color:var(--gold);font-weight:700}
.pcard.none{grid-column:1/-1;text-align:center}
.scorein{display:flex;align-items:center;justify-content:center;gap:12px}
.scorein .side{text-align:center}
.scorein .side .f{font-size:24px}
.stepper{display:flex;align-items:center;gap:10px;margin-top:6px}
.stepper button{width:36px;height:36px;border-radius:10px;background:var(--pill);border:1px solid var(--line);font-size:18px;font-weight:800}
.stepper .v{font-size:26px;font-weight:900;min-width:30px;text-align:center}
select.sel,input.txtin{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:11px 12px;color:var(--txt);font-size:14px}
select.sel{min-height:54px;padding:15px 12px;font-weight:600}
/* 예측 비교 보드 — 카테고리 탭 + 같은 예측 그룹핑 */
.btabs{display:flex;gap:14px;overflow-x:auto;overflow-y:hidden;touch-action:pan-x;margin-bottom:14px;border-bottom:1px solid var(--line)}
.tabs::-webkit-scrollbar,.btabs::-webkit-scrollbar{display:none}
.tabs,.btabs{scrollbar-width:none}
.btab{flex:0 0 auto;padding:9px 2px;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;border-radius:0;font-size:13px;font-weight:700;color:var(--sub);white-space:nowrap}
.btab.on{color:var(--txt);border-bottom-color:var(--selbd)}
.bgroup{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px;background:var(--card2)}
.bgroup:last-child{margin-bottom:0}
.bgroup.hit{border-color:var(--green);background:rgba(52,211,153,.10)}
.bgroup.miss{opacity:.5}
.bgv{font-size:13px;font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bgc{font-size:11px;font-weight:700;color:var(--sub)}
.bgtag{font-size:10px;font-weight:800;padding:2px 7px;border-radius:7px}
.bgtag.ok{background:rgba(52,211,153,.18);color:var(--green)}
.bgtag.uni{background:var(--sel);color:var(--gold)}
.bgtag.no{background:rgba(248,113,113,.16);color:#f87171}
.bgn{font-size:12px;color:var(--sub);line-height:1.7}
/* 한 줄 코멘트 — 카드 + 상단 롤링 티커 */
.cmts{display:flex;flex-direction:column;gap:10px}
.cmt{display:flex;gap:8px;font-size:13px;align-items:baseline;flex-wrap:wrap}
.cmt .cn{font-weight:800;flex:0 0 auto;color:var(--txt)}
.cmt .cc{color:var(--sub)}
.ticker{overflow:hidden;background:var(--card2);border:1px solid var(--line);border-radius:10px;margin-bottom:16px;padding:9px 0;white-space:nowrap}
.ticker .track{display:inline-block;white-space:nowrap;animation:ticker 22s linear infinite;will-change:transform}
.ticker:active .track{animation-play-state:paused}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker .ci{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--txt);margin:0 18px}
.ticker .ci b{color:var(--gold);font-weight:800}
.lbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lbtns .full{grid-column:1/-1}
.lb{position:relative}
.lbrow{display:flex;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:var(--sp-3) var(--sp-4);margin-bottom:8px;transition:transform .5s cubic-bezier(.2,.8,.2,1)}
.lbrow .rk{font-size:16px;font-weight:900;width:28px;text-align:center}
.lbrow .nm{font-weight:700;font-size:14px;flex:1;min-width:0}
.lbrow .pts{font-size:18px;font-weight:900;color:var(--gold)}
.lbrow .pend{font-size:10px;color:var(--sub)}
.lbrow.first{border-color:var(--selbd);background:linear-gradient(135deg,var(--sel),var(--card2))}
.lbrow.me{border-color:var(--selbd);background:var(--sel);box-shadow:inset 0 0 0 1.5px var(--selbd)}  /* 로그인한 본인 행 = 선택 표시 */
.permatch{width:100%;display:flex;gap:16px;margin-top:8px;padding-top:8px;border-top:1px solid var(--line);font-size:11px;color:var(--sub)}
.permatch b{color:var(--txt);font-weight:800;margin-left:3px}
.lbrow.gain{animation:gain 1.2s}
@keyframes gain{0%,100%{box-shadow:none}30%{box-shadow:0 0 0 2px var(--green)}}
.breakdown{display:none;grid-column:1/-1;width:100%;font-size:11px;color:var(--sub);padding-top:6px}
.lbrow.open .breakdown{display:block}
.bd-it{display:flex;justify-content:space-between;padding:2px 0}
.bd-it.hit{color:var(--green)} .bd-it.miss{color:#f87171} .bd-it.pend{color:var(--sub)}
/* 어드민: 참여자별 예측 */
.apred{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;background:var(--card2)}
.apred:last-child{margin-bottom:0}
.apred .apname{font-size:13px;font-weight:800;margin-bottom:6px}
.apred .bd-it{font-size:12px;color:var(--sub);padding:3px 0;gap:12px}
.apred .bd-it span:last-child{color:var(--txt);font-weight:600;text-align:right}
.attrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.attrow:last-child{border-bottom:none}
.attrow .atnm{flex:1;font-weight:700;font-size:14px;min-width:0}
.attrow.out .atnm{opacity:.45;text-decoration:line-through}
/* 점심값 내기 결과 */
.betrow{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;background:var(--card2)}
.betrow:last-of-type{margin-bottom:0}
.betrow .brk{font-size:15px;font-weight:900;width:24px;text-align:center}
.betrow .bnm{flex:1;font-weight:700;font-size:14px;min-width:0}
.betrow .bamt{font-weight:900;font-size:15px;white-space:nowrap}
.betrow.free{border-color:var(--green);background:rgba(52,211,153,.10)}
.betrow.free .bamt{color:var(--green)}
.betrow.most .bamt{color:var(--red)}
/* 개인 리포트 */
.lbrow.rep{cursor:pointer}
.lbrow.rep:active{transform:scale(.99)}
.repclubadge{display:block;font-size:11px;font-weight:700;color:var(--gold);margin-top:2px}
.repchev{color:var(--sub);font-size:18px;font-weight:700;margin-left:2px}
.repcard{word-break:keep-all}  /* 본문 단어단위 줄바꿈(한글 가독성) */
.repclu{display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;padding:28px 18px;border-radius:16px;background:var(--sel);border:1px solid var(--selbd);margin-bottom:20px}  /* 시원한 프로필 카드 — 세로 스택·중앙정렬 */
.repclu .ic{font-size:64px;line-height:1}
.repclu .cn{font-size:21px;font-weight:900}
.repclu .cd{font-size:12.5px;color:var(--sub);margin-top:5px;line-height:1.5}
.repstat{display:flex;justify-content:space-between;font-size:14px;font-weight:800;padding-bottom:14px;border-bottom:1px solid var(--line)}
.repsec{margin-top:26px}
.repsec h3{margin:0 0 9px}
.repp{font-size:13px;line-height:1.65;color:var(--txt)}
.repp.dim{color:var(--sub)}
.repp b{font-weight:800}
.rephit{display:flex;justify-content:space-between;align-items:center;gap:8px;min-height:46px;font-size:13px;font-weight:700;color:var(--green);background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.22);border-radius:9px;padding:9px 12px;margin-bottom:6px}
.rephit>span:first-child{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rules{display:flex;flex-direction:column}
.rulerow{padding:9px 0;border-bottom:1px solid var(--line)}
.rulerow:last-child{border-bottom:none}
.rulerow .rmain{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.rulerow .rn{font-size:13px;font-weight:700}
.rulerow .rp{font-size:14px;font-weight:900;color:var(--gold);white-space:nowrap}
.rulerow .rd{font-size:11px;color:var(--sub);margin-top:2px}
.rephit:last-child{margin-bottom:0}
.rephit .hp{font-weight:900;white-space:nowrap}
.repmiss{border-left:3px solid var(--red);padding:2px 0 2px 11px;margin-bottom:13px}  /* 빨간 라인이 콘텐츠보다 살짝만 높게 */
.repmiss:last-child{margin-bottom:0}
.repmiss .rmlbl{font-size:13px;font-weight:800}
.repmiss .rmpt{color:var(--red);font-size:11px;font-weight:800}
.repmiss .rmvs{font-size:12.5px;color:var(--sub);margin-top:3px;line-height:1.55}
.repmiss .rmvs b{color:var(--txt);font-weight:800}
.repgrade{font-weight:900}
.gS{color:#a855f7}.gA{color:var(--green)}.gB{color:var(--blue)}.gC{color:var(--gold)}.gD{color:#f97316}.gF{color:var(--red)}
.repverdict{font-size:13px;font-weight:700;background:var(--pill);border-radius:10px;padding:11px 13px;margin-top:14px;margin-bottom:2px;line-height:1.5}
.reptl .tlrow{padding:11px 0;border-bottom:1px dashed var(--line)}
.reptl .tlrow:last-child{border-bottom:none}
.reptl .tlfact{font-size:13.5px;line-height:1.5;color:var(--txt)}
.reptl .tlmine{font-size:12px;line-height:1.45;color:var(--sub);margin-top:5px}  /* 내 예측 비교 — 보조 텍스트로 분리 */
.reptl .tlmine.ok{color:var(--green)}
.reptl .tlmine.no{color:var(--red)}
.reptl .tlv.ok{color:var(--green)} .reptl .tlv.no{color:var(--red)}  /* 득점자별 적중/실패 색상 */
.reptl .tlmine.mix{color:var(--txt)}  /* 득점자 한쪽만 맞은 경우 '내 예측' 라벨은 기본 텍스트색 */
.reptl b{font-weight:800;color:var(--txt)}
.betdesc{margin-bottom:14px;padding-bottom:12px;border-bottom:1px dashed var(--line)}
.betdesc .bdt{font-size:12px;font-weight:800;margin-bottom:7px}
.betdesc .bdl{font-size:12px;color:var(--txt);line-height:1.6;margin-bottom:5px}
.betdesc .bdl:last-child{margin-bottom:0}
.betdesc .bdl b{font-weight:800}
.betdesc .bds{color:var(--sub)}
.betdesc .bstep{display:flex;gap:7px;font-size:12px;line-height:1.55;color:var(--txt);margin-bottom:9px}
.betdesc .bstep .bn{font-weight:800;flex-shrink:0}
.betdesc .bstep .bc{flex:1;min-width:0}
.betdesc .bstep .bdr{display:block;margin-top:3px}  /* 결과는 화살표로 줄바꿈, 윗줄 내용과 같은 들여쓰기 */
.betdesc .bstep b{font-weight:800}
.evlog{font-size:12px;color:var(--sub);line-height:1.9}

function demoClient(){
  function table(name){
    return {
      select(){const q={order(){return Promise.resolve({data:demoDB[name],error:null})},eq(k,v){q._f=[k,v];return q},single(){return Promise.resolve({data:demoDB[name].find(x=>x[q._f[0]]===q._f[1]),error:null})},then(res){res({data:demoDB[name],error:null})}};return q;},
      insert(row){demoDB[name].push({id:'d'+Date.now(),created_at:Date.now(),...row});return Promise.resolve({error:null});},
      update(patch){return{eq(k,v){const r=demoDB[name].find(x=>x[k]===v);if(r)Object.assign(r,patch);return Promise.resolve({error:null});}};},
      upsert(row){
        if(name==='predictions'){const ex=demoDB[name].find(x=>x.match_id===row.match_id&&x.participant_id===row.participant_id);if(ex)Object.assign(ex,row);else demoDB[name].push(row);}
        else {const ex=demoDB[name].find(x=>x.key===row.key);if(ex)Object.assign(ex,row);else demoDB[name].push(row);}
        return Promise.resolve({error:null});},
      delete(){return{eq(k,v){demoDB[name]=demoDB[name].filter(x=>x[k]!==v);return Promise.resolve({error:null});},neq(){demoDB[name]=[];return Promise.resolve({error:null});}};}
    };
  }

}

async function refresh(){
  // 코멘트 입력 중에는 5초 폴링 재렌더를 건너뛴다.
  // (전체 DOM 재생성으로 입력 글자·포커스·모바일 키보드가 날아가서
  //  '변경' 버튼이 안 먹히는 것처럼 보이던 문제 방지 — 입력칸을 벗어나면 다시 동작)

  if(_ae&&_ae.id&&_ae.id.startsWith('cmt_'))return;
  const mid=S.tab;
  const before=(mid!=='total'&&LOADED)?matchScores(S.matches[mid],mid):null;

  if(MODAL_OPEN)return;
  if(liveSig()===sigBefore)return;   // 변화 없으면 통째 재렌더 안 함 → 티커·탭 스크롤·펼친 행 유지
  // 관전자: 새 골/카드면 토스트 직전 즉각 상황 이펙트
  if(mid!=='total'){
    const La=S.matches[mid].live, m=MATCHES.find(x=>x.id===mid);
    if(La.goals.length>gBefore){const g=La.goals[La.goals.length-1];eventFlash('⚽','GOAL!',`${g.team==='kr'?'🇰🇷':TEAMS[m.opp].flag} ${esc(g.scorer)} ${goalTime(g)}`);}
    else if(La.cards>cBefore)eventFlash('🟨','카드','+1장');
    else if(La.finished&&!fBefore)eventFlash('🏁','경기 종료','최종 채점!');
  }
  const prevOrder=lbOrder();
  if(before){
    const after=matchScores(S.matches[mid],mid);

      const d=after[pid].total-(before[pid]?before[pid].total:0);

      else if(d<0)toast(`${avatarOf(pid)} ${gpname(pid)} ${d}점`,true);
    }
  }
  render();
  flip(prevOrder);
}

/* ================= SCORING ================= */
function getFacts(M,mid){
  const L=M.live, g=L.goals, f={};
  const fg=g[0];
  if(fg){f.firstTeam=fg.team; f.firstBand=fg.band!=null?fg.band:bandOf(fg.min);}
  else if(L.finished){f.firstTeam='none'; f.firstBand=-1;}
  const krg=g.filter(x=>x.team==='kr'), opg=g.filter(x=>x.team==='opp');
  if(krg[0]) f.krFirst=krg[0].scorer; else if(L.finished) f.krFirst='없음';
  if(opg[0]) f.oppFirst=opg[0].scorer; else if(L.finished) f.oppFirst='없음';
  if(L.half) f.half=Math.sign(L.half.kr-L.half.opp);
  if(L.finished){
    f.kr=krg.length; f.opp=opg.length;
    f.outcome=Math.sign(f.kr-f.opp);
    f.cards=cardEx(mid)?Math.min(L.cards,6):(L.cards<=2?0:L.cards<=5?1:2);
    if(L.mvp)f.mvp=L.mvp;   // MVP는 발표·등록됐을 때만 채점(늦게 나오므로 그 전엔 ⏳ 대기)
  }
  return f;
}
function bandOf(min){return min<=15?0:min<=30?1:min<=45?2:min<=60?3:min<=75?4:5;}
function scorePred(p,f,mid){
  const items=[];
  const add=(label,max,known,pts)=>items.push({label,max,pts:known?pts:0,state:known?(pts>0?'hit':'miss'):'pend'});
  add('경기 결과',60,'outcome'in f, p.result===f.outcome?60:0);
  let sc=0;
  if('outcome'in f){
    if(p.kr===f.kr&&p.opp===f.opp)sc=70;
    else if(Math.sign(p.kr-p.opp)===f.outcome)sc=30;
    else if(p.kr===f.kr||p.opp===f.opp)sc=15;
  }
  add('최종 스코어',70,'outcome'in f,sc);
  add('🇰🇷 첫 득점자',40,'krFirst'in f, p.krFirst===f.krFirst?40:0);
  add('상대 첫 득점자',40,'oppFirst'in f, p.oppFirst===f.oppFirst?40:0);
  add('첫 골 팀',15,'firstTeam'in f, p.firstTeam===f.firstTeam?15:0);
  let bd=0;
  if('firstBand'in f){
    if(p.band===f.firstBand)bd=30;
    else if(p.band>=0&&f.firstBand>=0&&Math.abs(p.band-f.firstBand)===1)bd=15;
  }
  add('첫 골 시간대',30,'firstBand'in f,bd);
  add('전반전 결과',15,'half'in f, p.half===f.half?15:0);
  let cpts=0;   // 카드: 정확 15, (2차전~) 인접 ±1이면 7점
  if('cards'in f){ if(p.cards===f.cards)cpts=15; else if(cardEx(mid)&&Math.abs(p.cards-f.cards)===1)cpts=7; }
  add('카드 수',15,'cards'in f,cpts);
  add('MVP',15,'mvp'in f, p.mvp===f.mvp?15:0);
  return items;
}
function totalOf(items){return items.reduce((s,i)=>s+i.pts,0)}
function pendingOf(items){return items.filter(i=>i.state==='pend').reduce((s,i)=>s+i.max,0)}
function matchScores(M,mid){
  const f=getFacts(M,mid), out={};
  for(const pid in M.preds){if(mid&&isAbsent(mid,pid))continue;const it=scorePred(M.preds[pid],f,mid);out[pid]={items:it,total:totalOf(it),pending:pendingOf(it)};}
  return out;
}

function curScores(mid){if(mid==='total'||!S.matches[mid])return null;const sc=matchScores(S.matches[mid],mid);const o={};for(const k in sc)o[k]=sc[k].total;return o;}

function replayMissed(mid){
  if(DEMO_MODE)return;
  let prev;try{prev=JSON.parse(localStorage.getItem('wc_seen_'+mid)||'null');}catch(e){return;}
  if(!prev)return;
  const now=curScores(mid);if(!now)return;
  const ds=[];for(const pid in now){const d=now[pid]-(prev[pid]||0);if(d)ds.push([pid,d]);}

const TWO_CHAR_SURNAMES=['남궁','황보','제갈','선우','독고','동방','사공','서문','어금'];
function gname(name){if(!name)return name;for(const s of TWO_CHAR_SURNAMES){if(name.startsWith(s)&&name.length>2)return name.slice(2);}return name.length>1?name.slice(1):name;}

function tieRanks(vals){const out=[];let lastV=null,lastR=0;vals.forEach((v,i)=>{let r;if(i>0&&v===lastV)r=lastR;else{r=i+1;lastR=r;lastV=v;}out.push(r);});return out;}

/* ---------- 점심값 내기 = 9,000원 상금풀(순위 비례 분배) + 점심값 엔빵 ---------- */
const LUNCH_TOTAL=196000; // 점심값(전원 엔빵 대상)
const BET_STAKE=9000;     // 1인당 내기 판돈 — 모아서 상금풀, 순위 비례로 분배
function won(n){return n.toLocaleString('ko-KR');}
function betSplit(mid){
  const sc=matchScores(S.matches[mid],mid);
  const rows=attendees(mid).map(p=>({p,t:sc[p.id]?sc[p.id].total:0})).sort((a,b)=>b.t-a.t);
  const N=rows.length;
  if(N<2)return null;
  const even=Math.round(LUNCH_TOTAL/N);       // 점심값 엔빵 1인분
  const pool=BET_STAKE*N, gross=even+BET_STAKE; // 상금풀 / 1인당 총 부담(점심+판돈)
  const pos=new Array(N);                       // 동점은 평균 등수 → 같은 금액
  let i=0;
  while(i<N){let j=i;while(j+1<N&&rows[j+1].t===rows[i].t)j++;const avg=(i+j)/2;for(let k=i;k<=j;k++)pos[k]=avg;i=j+1;}
  // 순위 비례 상금: 가중치 (N-1-등수) → 1등 최다 … 꼴등 0(판돈 9,000원 전액 잃음), 합 = 상금풀
  const W=N*(N-1)/2;
  const prize=pos.map(pv=>Math.round(pool*(N-1-pv)/W/100)*100);
  prize[0]+=pool-prize.reduce((a,b)=>a+b,0);    // 반올림 잔액은 1등 상금에 보정
  // 최종 낼 돈 = 점심엔빵 + 판돈 - 받은 상금
  const amt=prize.map(pr=>gross-pr);
  amt[N-1]+=LUNCH_TOTAL-amt.reduce((a,b)=>a+b,0); // 합계가 정확히 점심값이 되도록 꼴등 보정
  prize[N-1]=gross-amt[N-1];                      // 꼴등 표시 일관성(점심+판돈-상금=최종)
  return {rows,amt,prize,even,gross,pool};
}

  return `<div class="card"><h3>🍱 점심값 정산 <span class="pt">총 ${won(LUNCH_TOTAL)}원</span></h3>

function clusterCandidates(d){
  const {p,f,total}=d, pct=total/300;
  const exact=p.kr===f.kr&&p.opp===f.opp, resHit=p.result===f.outcome;
  const scorers=(p.krFirst===f.krFirst?1:0)+(p.oppFirst===f.oppFirst?1:0);
  const mvpHit=p.mvp===f.mvp, ftHit=p.firstTeam===f.firstTeam, bandHit=p.band===f.firstBand;
  const totGoals=p.kr+p.opp;

function assignClusters(mid){
  const M=S.matches[mid], sc=matchScores(M,mid);
  const order=S.participants.filter(p=>M.preds[p.id]&&!isAbsent(mid,p.id))
    .map(p=>({pid:p.id,t:sc[p.id]?sc[p.id].total:0,cand:clusterCandidates(reportData(p.id,mid))}))
    .sort((a,b)=>b.t-a.t);
  const used=new Set(),out={};
  for(const o of order){const pick=o.cand.find(c=>!used.has(c.n))||o.cand[o.cand.length-1];used.add(pick.n);out[o.pid]=pick;}
  return out;
}

function boardCard(mid,m,O,M){
  const f=getFacts(M,mid);
  const L=M.live;
  // 현재까지의 라이브 사실 — 정답이 아직 확정 안 됐어도 "이미 불가능"해진 예측을 가려내는 데 사용
  const krNow=L.goals.filter(g=>g.team==='kr').length, opNow=L.goals.filter(g=>g.team==='opp').length;
  const gScored=L.goals.length>0, cardsNow=L.cards;
  const pids=Object.keys(M.preds);
  if(!pids.length)return'';
  const oname=O.name;
  const resTxt=v=>v===1?'🇰🇷 승':v===0?'무':O.flag+' 승';
  const ftTxt=v=>v==='kr'?'🇰🇷':v==='opp'?O.flag+oname:'무득점';
  const CATS=[
    {key:'result',label:'경기 결과',get:p=>resTxt(p.result),fact:'outcome'in f?resTxt(f.outcome):undefined},
    {key:'score',label:'최종 스코어',get:p=>p.kr+':'+p.opp,fact:'outcome'in f?f.kr+':'+f.opp:undefined,dead:p=>p.kr<krNow||p.opp<opNow},
    {key:'krFirst',label:'🇰🇷 첫 득점자',get:p=>p.krFirst,fact:f.krFirst},
    {key:'oppFirst',label:`${O.flag} 첫 득점자`,get:p=>p.oppFirst,fact:f.oppFirst},
    {key:'firstTeam',label:'첫 골 팀',get:p=>ftTxt(p.firstTeam),fact:f.firstTeam!==undefined?ftTxt(f.firstTeam):undefined},
    {key:'band',label:'첫 골 시간대',get:p=>bandTxt(p.band),fact:'firstBand'in f?bandTxt(f.firstBand):undefined,dead:p=>!gScored&&('half'in f)&&p.band<=2},
    {key:'half',label:'전반전',get:p=>resTxt(p.half),fact:'half'in f?resTxt(f.half):undefined},
    {key:'cards',label:'카드 수',get:p=>cardLab(mid,p.cards),fact:'cards'in f?cardLab(mid,f.cards):undefined,dead:p=>cardEx(mid)?(p.cards<6&&cardsNow>p.cards+1):((p.cards===0&&cardsNow>2)||(p.cards===1&&cardsNow>5))},
    {key:'mvp',label:'MVP',get:p=>p.mvp,fact:f.mvp}
  ];
  const cur=CATS.find(c=>c.key===(S.boardTab||'result'))||CATS[0];
  const tabs=CATS.map(c=>`<button class="btab ${c.key===cur.key?'on':''}" onclick="S.boardTab='${c.key}';render()">${c.label}</button>`).join('');
  const known=cur.fact!==undefined, factStr=known?String(cur.fact):null;
  // 같은 예측끼리 그룹핑 → 인원 많은 순 (단독 픽은 자연히 1명 그룹으로 분리)
  const groups={};
  pids.forEach(pid=>{const v=String(cur.get(M.preds[pid]));(groups[v]=groups[v]||[]).push(pid);});
  let deadAny=false;
  const body=Object.entries(groups).sort((a,b)=>b[1].length-a[1].length).map(([v,ids])=>{
    const hit=known&&v===factStr;
    const dead=!known&&!!cur.dead&&cur.dead(M.preds[ids[0]]);   // 정답 미확정이지만 이미 불가능해진 픽
    if(dead)deadAny=true;
    const solo=!dead&&ids.length===1&&pids.length>=3;
    const cls=known?(hit?'hit':'miss'):(dead?'miss':(solo?'solo':''));
    const badge=known?(hit?'<span class="bgtag ok">정답</span>':'')
      :dead?'<span class="bgtag no">탈락</span>'
      :(solo?'<span class="bgtag uni">단독</span>':'');
    return `<div class="bgroup ${cls}">
      <div class="bgv">${esc(v)} <span class="bgc">${ids.length}명</span>${badge}</div>
      <div class="bgn">${ids.map(pid=>`${avatarOf(pid)} ${esc(gpname(pid))}`).join(' · ')}</div>
    </div>`;
  }).join('');
  const hint=known?'정답은 초록, 빗나간 예측은 흐리게 · 같은 예측끼리 묶음'
    :deadAny?'이미 빗나간 예측은 흐리게 · 같은 예측끼리 묶음'
    :'같은 예측끼리 묶었어요 · 단독 = 혼자 고른 예측';
  return `<div class="card"><h3>👀 ${m.label} 예측 비교</h3>
    <div class="hint">${hint}</div>
    <div class="btabs">${tabs}</div>
    ${body}</div>`;
}

async function lockMatch(mid){
  if(!ADMIN)return adminGate(()=>lockMatch(mid));
  const M=S.matches[mid],n=Object.keys(M.preds).length;
  if(!confirm(`${n}명 제출 완료. 마감하면 수정할 수 없습니다. 마감할까요?`))return;
  const {error}=await sb.from('match_state').update({locked:true}).eq('match_id',mid);
  if(error){alert('마감 실패: '+error.message);return;}
  M.locked=true;render();window.scrollTo(0,0);
}
async function startLive(mid){
  if(!ADMIN)return adminGate(()=>startLive(mid));
  S.matches[mid].live.on=true;
  await writeLive(mid);render();
}
async function withDiff(mid,fn){
  BUSY=true;
  const M=S.matches[mid];
  const before=matchScores(M,mid);
  fn();
  await writeLive(mid);
  BUSY=false;
  const after=matchScores(M,mid);
  const prevOrder=lbOrder();
  for(const pid in after){
    const d=after[pid].total-(before[pid]?before[pid].total:0);
    if(d>0)toast(`${avatarOf(pid)} ${gpname(pid)} +${d}점!`);
    else if(d<0)toast(`${avatarOf(pid)} ${gpname(pid)} ${d}점`,true);
  }
  render();
  flip(prevOrder);
}
function lbOrder(){
  const o={};document.querySelectorAll('#lb .lbrow').forEach(el=>o[el.dataset.pid]=el.getBoundingClientRect().top);
  return o;
}
function flip(prev){
  document.querySelectorAll('#lb .lbrow').forEach(el=>{
    const pid=el.dataset.pid;
    if(prev[pid]===undefined)return;
    const d=prev[pid]-el.getBoundingClientRect().top;
    if(Math.abs(d)>2){
      el.style.transition='none';el.style.transform=`translateY(${d}px)`;
      requestAnimationFrame(()=>{el.style.transition='';el.style.transform='';el.classList.add('gain');setTimeout(()=>el.classList.remove('gain'),1300);});
    }
  });
}
let _toastN=0;
function toast(msg,bad){
  const delay=_toastN*70; _toastN++;            // 미세 시간차로 따다닥(크리티컬 이펙트처럼)
  setTimeout(()=>{
    _toastN=Math.max(0,_toastN-1);
    const t=document.createElement('div');t.className='toast'+(bad?' bad':'');
    t.textContent=msg;$('#toasts').appendChild(t);setTimeout(()=>t.remove(),3100);
  },delay);
}
// 골·카드 등 점수 영향 이벤트 — 토스트 직전 즉각 상황 이펙트
function eventFlash(icon,title,sub){
  const el=document.createElement('div');el.className='eflash';
  el.innerHTML=`<div class="ef-ic">${icon}</div><div class="ef-tx">${title}${sub?`<span>${sub}</span>`:''}</div>`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),1600);
}

  eventFlash('🟨','카드','+1장');

}
function setHalf(mid){
  if(!ADMIN)return adminGate(()=>setHalf(mid));
  const L=S.matches[mid].live;
  const kr=L.goals.filter(g=>g.team==='kr').length, op=L.goals.filter(g=>g.team==='opp').length;
  if(!confirm(`전반 종료 스코어 ${kr}:${op} 로 기록할까요?`))return;
  withDiff(mid,()=>{L.half={kr,opp:op};});
}
async function undoEv(mid){
  if(!ADMIN)return adminGate(()=>undoEv(mid));
  const L=S.matches[mid].live;
  const log=L.evlog||[];
  if(L.finished){if(confirm('경기 종료를 취소할까요?')){L.finished=false;L.mvp=null;await writeLive(mid);render();}return;}
  if(log.length&&log[log.length-1]==='card'&&L.cards>0){L.cards--;log.pop();await writeLive(mid);render();return;}
  if(L.goals.length){if(confirm('마지막 골을 취소할까요?')){L.goals.pop();await writeLive(mid);render();}return;}
  if(L.half){if(confirm('전반 종료 기록을 취소할까요?')){L.half=null;await writeLive(mid);render();}return;}
  if(L.on&&!L.goals.length&&!L.cards&&!L.half){if(confirm('라이브 시작을 취소할까요? (아직 입력된 골·카드가 없습니다)')){L.on=false;await writeLive(mid);render();}return;}
  toast('취소할 입력이 없어요',true);
}

  const {data:msRow}=await sb.from('match_state').select('locked').eq('match_id',F.mid).single();
  if(msRow&&msRow.locked){BUSY=false;alert('방금 마감되어 제출할 수 없습니다 😢');closeModal();await fetchAll();render();return;}
  const {error}=await sb.from('predictions').upsert(
    {match_id:F.mid,participant_id:F.pid,data:d,updated_at:new Date().toISOString()},
    {onConflict:'match_id,participant_id'});
  BUSY=false;
  if(error){alert('제출 실패: '+error.message);return;}
  toast(`${avatarOf(F.pid)} ${pname(F.pid)} 예측 제출 완료!`);
  closeModal();await fetchAll();render();
}

/* ---------- 공유 ---------- */
function copyResult(mid){
  const m=MATCHES.find(x=>x.id===mid),O=TEAMS[m.opp],M=S.matches[mid];
  const sc=matchScores(M,mid);
  const rows=Object.keys(sc).map(pid=>({pid,t:sc[pid].total})).sort((a,b)=>b.t-a.t);
  const L=M.live;
  const kr=L.goals.filter(g=>g.team==='kr').length,op=L.goals.filter(g=>g.team==='opp').length;
  let txt=`⚽ ${m.label} 🇰🇷 ${kr}:${op} ${O.flag}\n— SKT 35기 월드컵응원단 예측 결과 —\n`;
  rows.forEach((r,i)=>txt+=`${i===0?'👑':i+1+'위'} ${pname(r.pid)} ${r.t}점\n`);
  navigator.clipboard.writeText(txt).then(()=>toast('복사 완료! 카톡에 붙여넣으세요 📋'));
}

/* ---------- 모달 ---------- */
function showModal(html,sheet){MODAL_OPEN=true;$('#modal').innerHTML=`<div class="mbox">${html}</div>`;$('#modal').classList.toggle('sheet',!!sheet);$('#modal').classList.add('show');$('#modal').scrollTop=0;document.body.style.overflow='hidden';}
function closeModal(){MODAL_OPEN=false;$('#modal').classList.remove('show','sheet');document.body.style.overflow='';}

/* ---------- 테마 토글 (라이트/다크, 선택은 localStorage 저장) ---------- */
function toggleTheme(){
  const next=document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',next);
  try{localStorage.setItem('theme',next);}catch(e){}
  syncThemeBtn();
}
const ICON_SUN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>';
const ICON_MOON='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
function syncThemeBtn(){
  const light=document.documentElement.getAttribute('data-theme')==='light';
  const b=document.getElementById('themeBtn'); if(b) b.innerHTML=light?ICON_SUN:ICON_MOON;
}
syncThemeBtn();
